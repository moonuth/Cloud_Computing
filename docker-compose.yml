version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: courtify_db
    environment:
      POSTGRES_USER: courtify
      POSTGRES_PASSWORD: courtify123
      POSTGRES_DB: courtify_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtify"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - courtify_network

  app:
    build: .
    container_name: courtify_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://courtify:courtify123@postgres:5432/courtify_dev
      JWT_SECRET: your-secret-key-12345
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - courtify_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: courtify_frontend
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Chia sẻ file hệ thống từ container app sang nginx
    volumes_from:
      - app
    depends_on:
      - app
    networks:
      - courtify_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  courtify_network:
    driver: bridge
